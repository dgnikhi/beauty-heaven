<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Beauty Heaven</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="navbar">
<div class="logo">Beauty Heaven</div>
<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="wishlist.html">Wishlist</a>
<a href="cart.html">Cart 🛒</a>
<a href="login.html">Login</a>
</nav>
</header>

<div class="wishlist-container">
<h2>My Wishlist</h2>
<div id="wishlist-items"></div>
</div>

<script src="js/products.js"></script>
<script>
function displayWishlist() {
    const wishlistContainer = document.getElementById('wishlist-items');
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    
    if (wishlist.length === 0) {
        wishlistContainer.innerHTML = '<p class="empty-message">Your wishlist is empty. <a href="products.html">Continue Shopping</a></p>';
        return;
    }
    
    let wishlistHTML = '';
    wishlist.forEach(productId => {
        const product = products.find(p => p.id == productId);
        if (product) {
            wishlistHTML += `
                <div class="wishlist-item">
                    <img src="${product.image}" alt="${product.name}">
                    <div class="wishlist-item-details">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <p class="wishlist-item-price">$${product.price}</p>
                    </div>
                    <div class="wishlist-item-actions">
                        <button class="wishlist-add-btn" onclick="addToCartFromWishlist(${product.id}, '${product.name}', ${product.price})">Add to Cart</button>
                        <button class="wishlist-remove-btn" onclick="removeFromWishlist(${product.id})">Remove</button>
                    </div>
                </div>
            `;
        }
    });
    
    wishlistContainer.innerHTML = wishlistHTML;
}

function removeFromWishlist(productId) {
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    wishlist = wishlist.filter(id => id !== productId);
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    displayWishlist();
}

function addToCartFromWishlist(productId, productName, productPrice) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existingProduct = cart.find(item => item.id === productId);
    
    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push({ id: productId, name: productName, price: productPrice, quantity: 1 });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(productName + ' added to cart!');
}

displayWishlist();
</script>

</body>
</html>
